name = "picx"
compatibility_date = "2026-03-01"

[[r2_buckets]]
binding = "PAPERS_BUCKET"
bucket_name = "picx-papers"
preview_bucket_name = "picx-papers-preview"

# R2 配置（用于预签名 URL）
# 注意：敏感信息应使用 secrets 而不是 vars
# 本地开发可以使用 .dev.vars 文件
# 生产环境使用: wrangler secret put R2_ACCESS_KEY_ID
#              wrangler secret put R2_SECRET_ACCESS_KEY
[vars]
# R2_ACCOUNT_ID = "your-account-id"  # 取消注释并填入实际值

# Queues 配置
# Producer: 用于发送消息到队列
[[queues.producers]]
binding = "PAPER_QUEUE"
queue = "paper-processing"

# Consumer: 处理队列消息
[[queues.consumers]]
queue = "paper-processing"
script = "picx"  # 指定处理队列消息的 worker
max_batch_size = 1  # 每批处理的消息数量
max_retries = 3  # 失败重试次数
dead_letter_queue = "paper-processing-dlq"  # 失败消息转发队列

